name: Build and upload to PyPI
# Build on every workflow_dispatch, branch push, tag push, and pull request change
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [master, wheelFix]

jobs:
  build_wheels_linux:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip and install cibuildwheel
        run: |
          python -m pip install --upgrade pip
          pip install cibuildwheel==v2.22.0

      - name: Build wheels
        env:
          CIBW_BUILD: cp${{ matrix.python-version }}-*  # Example: cp38-*
          CIBW_SKIP: "*-musllinux_* pp* *-*linux_{aarch64,ppc64le}"
          CIBW_ARCHS_LINUX: x86_64
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
          CIBW_ENVIRONMENT: >
            PIP_NO_CACHE_DIR=1
            IBM_DB_HOME=/home/runner/work/python-ibmdb/python-ibmdb/clidriver
        run: |
          python -m cibuildwheel --output-dir wheelhouse

      - name: List built wheels
        run: ls -l wheelhouse

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip build
      - name: Build sdist
        run: python -m build --sdist --no-isolation
      - name: Package version 
        id: version
        run: |
           cd dist
           pip install ibm_db*
           echo "VERSION=$(python -c 'import ibm_db; print(ibm_db.__version__)')" >> $GITHUB_OUTPUT
      - name: Build source distribution
        run: |
          PACKAGE="ibm_db-$VERSION"
          cd dist
          tar -xzf $PACKAGE.tar.gz
          rm -rf $PACKAGE/clidriver*
          rm -rf $PACKAGE.tar.gz
          tar -czf $PACKAGE.tar.gz $PACKAGE
          rm -rf $PACKAGE
        env:
          VERSION: ${{ steps.version.outputs.VERSION}}

      - name: Upload sdist
        uses: actions/upload-artifact@v4.4.3
        with:
          name: ibmdb-sdist
          path: dist/*.tar.gz

